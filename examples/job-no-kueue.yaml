---
apiVersion: batch/v1
kind: Job
metadata:
  name: job-sleep-multiple
  namespace: slinky
  # slurm-bridge annotations on parent object
  annotations:
    slinky.slurm.net/job-name: job-sleep-multiple
    slinky.slurm.net/timelimit: "5"
    slurmjob.slinky.slurm.net/account: slurm
    slurmjob.slinky.slurm.net/partition: all
spec:
  completions: 3
  parallelism: 3
  template:
    spec:
      schedulerName: slurm-bridge-scheduler
      containers:
        - name: sleep
          image: quay.io/prometheus/busybox
          command: [sh, -c, sleep 30]
          resources:
            requests:
              cpu: '1'
              memory: 100Mi
            limits:
              cpu: '1'
              memory: 100Mi
      restartPolicy: Never
