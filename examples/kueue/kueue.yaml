apiVersion: kueue.x-k8s.io/v1beta2
kind: ResourceFlavor
metadata:
  name: "default-flavor"
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: ClusterQueue
metadata:
  name: "cluster-queue"
spec:
  namespaceSelector: {} # match all.
  resourceGroups:
  - coveredResources: ["pods", "cpu", "memory"]
    flavors:
    - name: "default-flavor"
      resources:
      - name: "pods"
        nominalQuota: 10000
      - name: "cpu"
        nominalQuota: "36"
      - name: "memory"
        nominalQuota: 36Gi
---
apiVersion: kueue.x-k8s.io/v1beta2
kind: LocalQueue
metadata:
  namespace: "test-slurm"
  name: "user-queue"
spec:
  clusterQueue: "cluster-queue"


