---
apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  generateName: lws-slurm-
  namespace: test-slurm
  annotations:
    slurmjob.slinky.slurm.net/account: slurm
    slurmjob.slinky.slurm.net/partition: all
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    leaderTemplate:
      metadata:
        labels:
          role: leader
      spec:
        containers:
          - name: leader
            image: busybox:stable
            command: [sh, -c, sleep 60]
            resources:
              requests:
                cpu: '1'
                memory: 100Mi
              limits:
                cpu: '1'
                memory: 100Mi
    workerTemplate:
      metadata:
        labels:
          role: worker
      spec:
        containers:
          - name: worker
            image: busybox:stable
            command: [sh, -c, sleep 60]
            resources:
              requests:
                cpu: '1'
                memory: 100Mi
              limits:
                cpu: '1'
                memory: 100Mi
