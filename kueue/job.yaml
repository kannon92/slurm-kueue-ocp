apiVersion: batch/v1
kind: Job
metadata:
  generateName: sample-job-
  namespace: slinky
  labels:
    kueue.x-k8s.io/queue-name: user-queue
  annotations:
    slinky.slurm.net/job-name: job-sleep-single-3
    slinky.slurm.net/timelimit: "5"
    slurmjob.slinky.slurm.net/account: slurm
    slurmjob.slinky.slurm.net/partition: all
spec:
  parallelism: 3
  completions: 3
  suspend: true
  template:
    spec:
      schedulerName: slurm-bridge-scheduler
      containers:
      - name: dummy-job
        image: registry.k8s.io/e2e-test-images/agnhost:2.53
        args: ["pause"]
        resources:
          requests:
            cpu: "1"
            memory: "100Mi"
      restartPolicy: Never

