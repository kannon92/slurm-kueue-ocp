# Source: slurm/templates/vendor/nvidia/dcgm/prolog-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: slurm-prolog-dcgm
  namespace: default
  labels:
    helm.sh/chart: slurm-1.1.0
    app.kubernetes.io/part-of: slurm
    app.kubernetes.io/version: "25.11"
    app.kubernetes.io/managed-by: Helm
data:
  
  prolog-90-dcgm.sh: |
    #!/bin/bash
    # SPDX-FileCopyrightText: Copyright (C) SchedMD LLC.
    # SPDX-FileCopyrightText: Copyright (C) NVIDIA CORPORATION & AFFILIATES. All rights reserved.
    # SPDX-License-Identifier: Apache-2.0
    #
    # DCGM GPU-to-Job Mapping Prolog Script
    #
    # This script runs when jobs start on GPU nodes and creates job mapping files
    # for the DCGM exporter to correlate GPU metrics with Slurm job IDs.
    
    function log_msg() {
    	echo "[$(date)] [$$] $*" >&2
    }
    
    function set_globals() {
    	declare -g METRICS_DIR="/var/lib/dcgm-exporter/job-mapping"
    }
    
    function make_gpu_job_files() {
    	if [[ -z ${SLURM_JOB_GPUS:-} ]]; then
    		log_msg "no gres gpus requested by user"
    		return
    	fi
    
    	if [[ ! -d ${METRICS_DIR:-} ]]; then
    		mkdir -p "${METRICS_DIR:-}" || (
    			log_msg "unable to create the data dir ${METRICS_DIR:-missing}"
    			return
    		)
    	fi
    
    	mapfile -t -d ',' cuda_devs <<<"${SLURM_JOB_GPUS:-}"
    	cuda_devs[-1]="${cuda_devs[-1]%$'\n'}"
    
    	for gpu_id in "${cuda_devs[@]}"; do
    		log_msg "writing ${METRICS_DIR:-}/${gpu_id:-99}"
    		printf "%s" "${SLURM_JOB_ID:-0}" >"${METRICS_DIR:-}/${gpu_id:-99}" || log_msg "unable to write job file"
    	done
    }
    
    set -o nounset -o errexit -o pipefail -o errtrace
    set_globals
    make_gpu_job_files
